<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>GrepoPro - Auto</title>
    <style>
        body { background: #121212; color: #eee; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        .app { max-width: 1000px; margin: 0 auto; height: 90vh; display: grid; grid-template-columns: 250px 1fr; gap: 20px; }
        
        /* Sidebar */
        aside { background: #1e1e1e; padding: 20px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); display: flex; flex-direction: column; }
        h2 { color: var(--accent); margin-top: 0; font-size: 1.2em; }
        
        /* Boutons */
        .btn { display: block; width: 100%; padding: 15px; margin-bottom: 10px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 14px; text-align: left; transition: 0.2s; position: relative; overflow: hidden; }
        .btn:hover { transform: translateX(3px); }
        
        .btn-agri { background: #2e3a25; color: #8ff896; border-left: 5px solid var(--green); }
        .btn-culture { background: #2e2530; color: #d8b4f5; border-left: 5px solid var(--purple); }
        .btn-build { background: #302e25; color: #ffdaad; border-left: 5px solid var(--orange); }
        .btn-stop { background: #3a1e1e; color: #ff9696; border-left: 5px solid var(--danger); margin-top: auto;}
        
        .active-agri { background: var(--green); color: white; box-shadow: 0 0 10px rgba(76, 175, 80, 0.4); }
        .active-culture { background: var(--purple); color: white; box-shadow: 0 0 10px rgba(156, 39, 176, 0.4); }
        .active-build { background: var(--orange); color: black; box-shadow: 0 0 10px rgba(255, 152, 0, 0.4); }

        /* Stats & Logs */
        main { display: flex; flex-direction: column; }
        
        .stats-bar { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .stat-box { background: #1e1e1e; padding: 15px; border-radius: 8px; text-align: center; border: 1px solid #333; }
        .stat-num { font-size: 24px; font-weight: bold; color: white; }
        .stat-label { font-size: 12px; color: #888; text-transform: uppercase; }

        .console { flex-grow: 1; background: #0d0d0d; border-radius: 8px; padding: 15px; font-family: 'Consolas', monospace; font-size: 13px; overflow-y: auto; border: 1px solid #333; }
        .log { margin-bottom: 4px; opacity: 0.9; }
        .log-info { color: #aaa; }
        .log-success { color: var(--green); font-weight: bold; }
        .log-action { color: var(--accent); }
        .time { color: #555; margin-right: 8px; }
        
        /* Palette de couleurs */
        :root { --accent: #ffb700; --green: #4caf50; --purple: #9c27b0; --orange: #ff9800; --danger: #f44336; }
    </style>
</head>
<body>

<div class="app">
    <aside>
        <h2>GrepoPro v2.0</h2>
        
        <div style="font-size: 12px; color: #888; margin-bottom: 20px;">Sélectionnez un module pour activer l'automatisation.</div>

        <!-- Boutons Modules -->
        <button id="btn-agri" class="btn btn-agri" onclick="app.toggle('agri')">
            🌾 Agri Auto<br><small style="display:block; font-weight:normal; font-size:11px; opacity:0.8">Villages / Champs</small>
        </button>

        <button id="btn-culture" class="btn btn-culture" onclick="app.toggle('culture')">
            🏛️ Culture Auto<br><small style="display:block; font-weight:normal; font-size:11px; opacity:0.8">Noumènes / Agrandissement</small>
        </button>

        <button id="btn-build" class="btn btn-build" onclick="app.toggle('build')">
            🏗️ Build Auto<br><small style="display:block; font-weight:normal; font-size:11px; opacity:0.8">Construction</small>
        </button>

        <button class="btn btn-stop" onclick="app.stopAll()">🛑 STOP TOUT</button>
    </aside>

    <main>
        <!-- Barre de stats -->
        <div class="stats-bar">
            <div class="stat-box">
                <div id="count-agri" class="stat-num">0</div>
                <div class="stat-label">Collectes Agri</div>
            </div>
            <div class="stat-box">
                <div id="count-culture" class="stat-num" style="color:var(--purple)">0</div>
                <div class="stat-label">Noumènes</div>
            </div>
            <div class="stat-box">
                <div id="count-build" class="stat-num" style="color:var(--orange)">0</div>
                <div class="stat-label">Bâtiments</div>
            </div>
        </div>

        <!-- Console Logs -->
        <div id="console" class="console">
            <div class="log log-info"><span class="time"></span> Système initialisé. En attente d'action...</div>
        </div>
    </main>
</div>

<!-- Script Moteur (Logique JS) -->
<script type="module">
    import { createApp } from 'https://grepo-bot-pro.github.io/core/app.js'; // Chargement depuis GitHub Pages
    
    window.app = createApp();
    
    // Fallback local si non hébergé sur GH (pour le développement local sans serveurs)
    if(window.location.host !== 'grepo-bot-pro.github.io' && !window.location.pathname.includes('raw')) {
        console.warn("Mode Local. Le script cherche l'API GitHub mais est en mode local.");
    }
</script>

</body>
</html>
